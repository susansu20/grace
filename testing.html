<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Your Sales Attachment Style?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

html, body {
  min-height: 100vh;
  background: #181715;
  font-family: 'Lato', sans-serif;
  position: relative;
  overflow-x: hidden;
}

/* ── Background (shows on intro/result screens) ── */
#bg-layer {
  position: fixed;
  inset: 0;
  background: #9e1d16;
  z-index: 0;
  transition: opacity 0.5s;
}
#bg-layer::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,249,244,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
}
.bg-watermark {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Playfair Display', serif;
  font-size: clamp(120px, 22vw, 280px);
  font-weight: 900;
  color: rgba(255,249,244,0.05);
  line-height: 1;
  pointer-events: none;
  white-space: nowrap;
  letter-spacing: -0.02em;
  z-index: 1;
  user-select: none;
}
.corner-tl, .corner-br {
  position: fixed; pointer-events: none; z-index: 1;
}
.corner-tl {
  top: -2px; left: -2px; width: 180px; height: 180px;
  border-top: 3px solid rgba(204,196,78,0.25);
  border-left: 3px solid rgba(204,196,78,0.25);
  border-radius: 2px;
}
.corner-br {
  bottom: -2px; right: -2px; width: 180px; height: 180px;
  border-bottom: 3px solid rgba(204,196,78,0.25);
  border-right: 3px solid rgba(204,196,78,0.25);
  border-radius: 2px;
}
.brand-tag {
  position: fixed; top: 2rem; left: 50%;
  transform: translateX(-50%);
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: #ccc44e;
  z-index: 10; white-space: nowrap; pointer-events: none;
}

/* ── Dollar cursor ── */
#dollar-cursor {
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  font-size: 26px; font-weight: 900; color: #ccc44e;
  font-family: 'Lato', sans-serif; line-height: 1;
  transform: translate(-50%, -50%); user-select: none;
}

/* ── Coin stack ── */
#coin-stack {
  position: fixed; bottom: 20px; left: 20px;
  z-index: 9998; display: flex;
  flex-direction: column-reverse; align-items: center;
  pointer-events: none;
}
.coin {
  font-size: 42px; line-height: 1; display: block;
  animation: coinDrop 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
  transform-origin: center bottom;
}
@keyframes coinDrop {
  0%   { opacity:0; transform:translateY(-40px) scale(0.6); }
  60%  { opacity:1; transform:translateY(4px) scale(1.1); }
  80%  { transform:translateY(-3px) scale(0.97); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

/* ══════════════════════════════════════
   QUIZ UI
══════════════════════════════════════ */
#quiz-ui {
  position: relative; z-index: 5;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 5rem 2rem 4rem;
}

.quiz-screen {
  display: none;
  width: 100%; max-width: 860px;
  animation: fadeUp 0.35s ease;
}
.quiz-screen.active { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* step counter */
.step-num {
  font-size: 13px; font-weight: 700; letter-spacing: 0.14em;
  color: #ccc44e; margin-bottom: 2rem;
}

/* question text */
.step-question {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 4.5vw, 52px);
  font-weight: 700; color: #fff9f4;
  line-height: 1.2; margin-bottom: 2.5rem;
  max-width: 820px;
}

/* ── Choice grid ── */
.choices-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (max-width: 560px) {
  .choices-grid { grid-template-columns: 1fr; }
}

.choice-card {
  background: #1e1d1b;
  border: 1.5px solid rgba(255,249,244,0.1);
  border-radius: 12px;
  padding: 1.25rem 1.25rem 1.25rem 1rem;
  display: flex; align-items: flex-start; gap: 14px;
  cursor: none;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  user-select: none;
}
.choice-card:hover {
  border-color: rgba(204,196,78,0.5);
  background: #242320;
  transform: translateY(-2px);
}
.choice-card.selected {
  border-color: #ccc44e;
  background: rgba(204,196,78,0.08);
}
.choice-num {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border: 1.5px solid rgba(204,196,78,0.5);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #ccc44e;
  margin-top: 1px;
  transition: background 0.15s, border-color 0.15s;
}
.choice-card.selected .choice-num {
  background: #ccc44e;
  border-color: #ccc44e;
  color: #181715;
}
.choice-text {
  font-size: 15px; color: rgba(255,249,244,0.85);
  line-height: 1.5; font-family: 'Lato', sans-serif;
}
.choice-card.selected .choice-text { color: #fff9f4; }

/* ── Text / Email step ── */
.step-input {
  width: 100%;
  background: rgba(255,249,244,0.07);
  border: 1.5px solid rgba(204,196,78,0.35);
  border-radius: 8px;
  padding: 18px 22px;
  font-size: 18px;
  color: #fff9f4;
  font-family: 'Lato', sans-serif;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
.step-input:focus {
  border-color: #ccc44e;
  background: rgba(255,249,244,0.1);
}
.step-input::placeholder { color: rgba(255,249,244,0.3); }

/* ── Checkbox step ── */
.checkbox-card {
  display: flex; align-items: center; gap: 16px;
  background: #1e1d1b;
  border: 1.5px solid rgba(255,249,244,0.1);
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  cursor: none;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
  max-width: 500px;
}
.checkbox-card:hover { border-color: rgba(204,196,78,0.5); background: #242320; }
.checkbox-card.checked { border-color: #ccc44e; background: rgba(204,196,78,0.08); }
.checkbox-box {
  width: 24px; height: 24px; flex-shrink: 0;
  border: 2px solid rgba(204,196,78,0.5);
  border-radius: 5px; background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.checkbox-card.checked .checkbox-box {
  background: #ccc44e; border-color: #ccc44e;
}
.checkbox-check { display: none; }
.checkbox-card.checked .checkbox-check { display: block; }
.checkbox-label {
  font-size: 15px; color: rgba(255,249,244,0.85);
  font-family: 'Lato', sans-serif; line-height: 1.4;
}

/* ── Next button ── */
.next-btn {
  margin-top: 2rem;
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  border: 1.5px solid rgba(204,196,78,0.5);
  color: #ccc44e;
  padding: 13px 28px;
  border-radius: 6px;
  font-size: 13px; font-weight: 900; letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'Lato', sans-serif;
  cursor: none;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.next-btn:hover {
  background: rgba(204,196,78,0.1);
  border-color: #ccc44e;
  transform: translateY(-1px);
}
.next-btn:disabled { opacity: 0.35; pointer-events: none; }

/* ── Progress bar ── */
.progress-wrap {
  position: fixed; top: 0; left: 0; right: 0;
  height: 3px; background: rgba(255,249,244,0.08); z-index: 20;
}
.progress-fill {
  height: 100%; background: #ccc44e;
  border-radius: 0 2px 2px 0;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* ── Thank-you screen ── */
#screen-thanks {
  display: none;
  position: relative; z-index: 5;
  min-height: 100vh;
  align-items: center; justify-content: center;
  flex-direction: column;
  text-align: center; padding: 4rem 2rem;
}
#screen-thanks.active { display: flex; }
#screen-thanks h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 900; color: #fff9f4;
  margin-bottom: 1rem;
}
#screen-thanks p {
  font-size: 16px; color: rgba(255,249,244,0.6);
  max-width: 400px; line-height: 1.7;
}

/* ── Kajabi form hidden ── */
#kajabi-sink {
  position: absolute; left: -9999px; top: -9999px;
  width: 1px; height: 1px; overflow: hidden;
  opacity: 0; pointer-events: none;
}
</style>
</head>
<body>

<!-- Background -->
<div id="bg-layer"></div>
<div class="bg-watermark">SALES</div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="brand-tag">Pitch Please!</div>

<!-- Progress bar -->
<div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<!-- Dollar cursor -->
<div id="dollar-cursor">$</div>

<!-- Coin stack -->
<div id="coin-stack"></div>

<!-- Custom quiz UI -->
<div id="quiz-ui"></div>

<!-- Thank you -->
<div id="screen-thanks">
  <h2>You're in. ✦</h2>
  <p>Check your inbox — your results are on their way.</p>
</div>

<!-- Kajabi form renders here, hidden — we parse & submit it programmatically -->
<div id="kajabi-sink">
  <script src="https://grace-yeo.mykajabi.com/forms/2149570193/embed.js"></script>
</div>

<script>
/* ══ Dollar cursor ══ */
(function() {
  var c = document.getElementById('dollar-cursor');
  document.addEventListener('mousemove', function(e) {
    c.style.left = e.clientX + 'px';
    c.style.top  = e.clientY + 'px';
  });
})();

/* ══ Web Audio (Shopify ka-ching) ══ */
var audioCtx = null, kachingBuffer = null;
function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  fetch('Voicy_Shopify sales notification.mp3')
    .then(function(r) { return r.arrayBuffer(); })
    .then(function(buf) { audioCtx.decodeAudioData(buf, function(d) { kachingBuffer = d; }); })
    .catch(function() {});
}
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click',      initAudio, { once: true });

async function playChaChingSound() {
  try {
    if (!audioCtx || !kachingBuffer) return;
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    var src = audioCtx.createBufferSource();
    src.buffer = kachingBuffer;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

/* ══ Coin stack ══ */
var coinCount = 0, MAX_COINS = 20;
var coinStack = document.getElementById('coin-stack');
function dropCoin(withSound) {
  if (coinCount >= MAX_COINS) return;
  var coin = document.createElement('span');
  coin.className = 'coin';
  coin.textContent = '\u{1F4B0}';
  coin.style.animation = 'none';
  coinStack.prepend(coin);
  void coin.offsetWidth;
  coin.style.animation = '';
  coinCount++;
  if (withSound) playChaChingSound();
}
dropCoin(false); // seed 1 silent coin

/* ══ Quiz engine ══ */
var quizSteps = [];
var currentStep = 0;
var quizAnswers = {}; // fieldName/index → value

/* Wait for Kajabi form to render, then parse its fields */
function waitForKajabi() {
  var sink = document.getElementById('kajabi-sink');
  var attempts = 0;

  var poll = setInterval(function() {
    attempts++;
    var form = sink.querySelector('form');
    var fields = form ? form.querySelectorAll('input:not([type="hidden"]):not([type="submit"]), select, textarea') : [];

    if (fields.length > 0 || attempts > 40) {
      clearInterval(poll);
      if (fields.length > 0) buildQuiz(form, fields);
    }
  }, 300);
}

function getLabelFor(field, form) {
  /* 1. explicit <label for="id"> */
  if (field.id) {
    var lbl = form.querySelector('label[for="' + field.id + '"]');
    if (lbl) return lbl.textContent.trim();
  }
  /* 2. wrapping <label> */
  var parent = field.closest('label');
  if (parent) {
    var clone = parent.cloneNode(true);
    clone.querySelectorAll('input,select,textarea').forEach(function(el) { el.remove(); });
    var txt = clone.textContent.trim();
    if (txt) return txt;
  }
  /* 3. sibling label */
  var prev = field.previousElementSibling;
  while (prev) {
    if (prev.tagName === 'LABEL') return prev.textContent.trim();
    prev = prev.previousElementSibling;
  }
  /* 4. placeholder or name */
  return field.placeholder || field.name || '';
}

function buildQuiz(form, fields) {
  quizSteps = [];
  fields.forEach(function(field, idx) {
    if (field.type === 'hidden' || field.type === 'submit') return;
    var label = getLabelFor(field, form);
    var step = { field: field, label: label, type: field.type || field.tagName.toLowerCase(), index: idx };
    if (field.tagName === 'SELECT') {
      step.options = Array.from(field.options)
        .filter(function(o) { return o.value !== ''; })
        .map(function(o) { return { value: o.value, text: o.text }; });
    }
    quizSteps.push(step);
  });

  renderAllSteps();
  showStep(0);
}

function renderAllSteps() {
  var container = document.getElementById('quiz-ui');
  container.innerHTML = '';

  quizSteps.forEach(function(step, idx) {
    var screen = document.createElement('div');
    screen.className = 'quiz-screen';
    screen.id = 'step-' + idx;

    var numStr = String(idx + 1).padStart(2, '0');
    var total  = String(quizSteps.length).padStart(2, '0');

    var html = '<div class="step-num">' + numStr + ' / ' + total + '</div>';
    html += '<div class="step-question">' + escHtml(step.label || 'Question ' + (idx+1)) + '</div>';

    if (step.type === 'select-one' || step.type === 'select') {
      /* Choice cards grid */
      html += '<div class="choices-grid" id="choices-' + idx + '">';
      step.options.forEach(function(opt, oi) {
        html += '<div class="choice-card" data-step="' + idx + '" data-value="' + escAttr(opt.value) + '" onclick="selectChoice(this,' + idx + ')">'
          + '<div class="choice-num">' + (oi + 1) + '</div>'
          + '<div class="choice-text">' + escHtml(opt.text) + '</div>'
          + '</div>';
      });
      html += '</div>';
      /* Next shown after selection — added by selectChoice() */
      html += '<div id="next-wrap-' + idx + '" style="display:none">'
        + '<button class="next-btn" onclick="advance(' + idx + ')">Next &rarr;</button></div>';

    } else if (step.type === 'checkbox') {
      html += '<div class="checkbox-card" id="cb-card-' + idx + '" onclick="toggleCheckbox(' + idx + ')">'
        + '<div class="checkbox-box"><svg class="checkbox-check" width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#181715" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        + '<div class="checkbox-label">' + escHtml(step.label) + '</div>'
        + '</div>';
      html += '<button class="next-btn" style="margin-top:1.5rem" onclick="advance(' + idx + ')">Next &rarr;</button>';

    } else {
      /* Text / email */
      var inputType = step.type === 'email' ? 'email' : 'text';
      html += '<input class="step-input" id="input-' + idx + '" type="' + inputType + '" placeholder="' + escAttr(step.label) + '" oninput="onTextInput(' + idx + ',this)" />';
      html += '<button class="next-btn" id="next-btn-' + idx + '" style="margin-top:1.5rem" onclick="advance(' + idx + ')" disabled>Next &rarr;</button>';
    }

    screen.innerHTML = html;
    container.appendChild(screen);
  });
}

function showStep(idx) {
  document.querySelectorAll('.quiz-screen').forEach(function(s) { s.classList.remove('active'); });
  var screen = document.getElementById('step-' + idx);
  if (screen) screen.classList.add('active');
  currentStep = idx;

  /* progress */
  var pct = quizSteps.length > 1 ? (idx / (quizSteps.length - 1)) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function selectChoice(el, stepIdx) {
  /* deselect others */
  document.querySelectorAll('#choices-' + stepIdx + ' .choice-card').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
  quizAnswers[stepIdx] = el.dataset.value;

  /* show next button */
  document.getElementById('next-wrap-' + stepIdx).style.display = 'block';

  /* coin + sound */
  dropCoin(true);
}

function toggleCheckbox(stepIdx) {
  var card = document.getElementById('cb-card-' + stepIdx);
  card.classList.toggle('checked');
  quizAnswers[stepIdx] = card.classList.contains('checked') ? 'true' : 'false';
}

function onTextInput(stepIdx, el) {
  quizAnswers[stepIdx] = el.value;
  var btn = document.getElementById('next-btn-' + stepIdx);
  if (btn) btn.disabled = !el.value.trim();
}

function advance(stepIdx) {
  var next = stepIdx + 1;
  if (next < quizSteps.length) {
    /* coin on text/checkbox advance */
    var step = quizSteps[stepIdx];
    if (step.type !== 'select-one' && step.type !== 'select') dropCoin(true);
    showStep(next);
  } else {
    submitToKajabi();
  }
}

/* ── Sync answers into hidden Kajabi form & submit ── */
function submitToKajabi() {
  document.getElementById('progress-fill').style.width = '100%';

  var sink = document.getElementById('kajabi-sink');
  var form = sink.querySelector('form');

  quizSteps.forEach(function(step, idx) {
    var val = quizAnswers[idx];
    if (val === undefined || val === null) return;
    var field = step.field;

    if (field.tagName === 'SELECT') {
      /* native setter for framework-controlled selects */
      var nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype, 'value');
      if (nativeSetter && nativeSetter.set) nativeSetter.set.call(field, val);
      else field.value = val;
      field.dispatchEvent(new Event('change', { bubbles: true }));
      field.dispatchEvent(new Event('input',  { bubbles: true }));

    } else if (field.type === 'checkbox') {
      field.checked = (val === 'true');
      field.dispatchEvent(new Event('change', { bubbles: true }));

    } else {
      var nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value');
      if (nativeSetter && nativeSetter.set) nativeSetter.set.call(field, val);
      else field.value = val;
      field.dispatchEvent(new Event('input',  { bubbles: true }));
      field.dispatchEvent(new Event('change', { bubbles: true }));
    }
  });

  /* click Kajabi's own submit button */
  var submitBtn = sink.querySelector('button[type="submit"], input[type="submit"], button:not([type])');
  if (submitBtn) {
    submitBtn.click();
  } else if (form) {
    form.submit();
  }

  /* show thank-you */
  setTimeout(showThanks, 600);
}

function showThanks() {
  document.getElementById('quiz-ui').style.display = 'none';
  var thanks = document.getElementById('screen-thanks');
  thanks.classList.add('active');
  /* rain coins */
  for (var i = 0; i < 5; i++) {
    (function(delay) {
      setTimeout(function() { dropCoin(i === 0); }, delay);
    })(i * 220);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

/* ── Start ── */
waitForKajabi();
</script>
</body>
</html>
