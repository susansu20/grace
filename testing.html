<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Your Sales Attachment Style?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

@media (pointer: coarse) {
  * { cursor: auto; }
  #dollar-cursor { display: none !important; }
}

html, body {
  min-height: 100vh;
  background: #181715;
  font-family: 'Inter', sans-serif;
  position: relative;
  overflow-x: hidden;
}

/* ── Background ── */
#bg-layer { position: fixed; inset: 0; background: #9e1d16; z-index: 0; }
#bg-layer::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,249,244,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
}
.corner-tl, .corner-br { position: fixed; pointer-events: none; z-index: 1; }
.corner-tl { top:-2px; left:-2px; width:180px; height:180px; border-top:3px solid rgba(204,196,78,0.25); border-left:3px solid rgba(204,196,78,0.25); border-radius:2px; }
.corner-br { bottom:-2px; right:-2px; width:180px; height:180px; border-bottom:3px solid rgba(204,196,78,0.25); border-right:3px solid rgba(204,196,78,0.25); border-radius:2px; }

/* ── Logo ── */
.brand-logo {
  position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%);
  font-family: 'Marcellus', serif; font-size: clamp(14px, 2.2vw, 24px);
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #ccc44e; z-index: 10; white-space: nowrap; pointer-events: none; user-select: none;
}

/* ── Progress bar ── */
.progress-wrap { position: fixed; top:0; left:0; right:0; height:3px; background:rgba(255,249,244,0.08); z-index:20; }
.progress-fill { height:100%; background:#ccc44e; border-radius:0 2px 2px 0; transition:width 0.4s cubic-bezier(.4,0,.2,1); }

/* ── Dollar cursor ── */
#dollar-cursor {
  position: fixed; top:0; left:0; pointer-events:none; z-index:9999;
  font-size:26px; font-weight:900; color:#ccc44e;
  font-family:'Inter',sans-serif; line-height:1;
  transform:translate(-50%,-50%); user-select:none;
}

/* ── Bag progress — horizontal row, bottom centre ── */
#bag-progress {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: row; gap: 8px;
  z-index: 9998; pointer-events: none; white-space: nowrap;
}
.prog-bag {
  font-size: 28px; line-height: 1; display: inline-block;
  filter: grayscale(1) opacity(0.22);
  transition: filter 0.45s ease;
}
.prog-bag.filled { filter: none; animation: bagBounce 0.48s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes bagBounce {
  0%   { transform: scale(0.55); }
  55%  { transform: scale(1.28); }
  80%  { transform: scale(0.94); }
  100% { transform: scale(1); }
}
@media (max-width: 700px) {
  .prog-bag { font-size: 18px; }
  #bag-progress { bottom: 10px; gap: 4px; }
}

/* ══ QUIZ UI ══ */
#quiz-ui {
  position: relative; z-index: 5;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 5.5rem 2rem 110px;
}
@media (max-width: 700px) { #quiz-ui { padding: 4.5rem 1rem 70px; } }

/* Stage wrapper — prevents flex width-snap glitch */
#quiz-stage { width: 100%; max-width: 900px; }

/* ── Screen transitions ── */
.quiz-screen { display: none; width: 100%; }

.quiz-screen.active {
  display: block;
  animation: enterFromBelow 0.38s cubic-bezier(0.22,1,0.36,1) both;
}
.quiz-screen.active.from-back {
  animation: enterFromAbove 0.38s cubic-bezier(0.22,1,0.36,1) both;
}
.quiz-screen.exiting {
  display: block; pointer-events: none;
  animation: exitToAbove 0.26s ease both;
}
.quiz-screen.exiting.to-back { animation: exitToBelow 0.26s ease both; }

/* Enter: opacity + translate only (no blur — prevents "visible-while-loading" glitch) */
@keyframes enterFromBelow {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes enterFromAbove {
  from { opacity: 0; transform: translateY(-22px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* Exit: keep blur for the outgoing question */
@keyframes exitToAbove {
  from { opacity: 1; transform: translateY(0);    filter: blur(0); }
  to   { opacity: 0; transform: translateY(-28px); filter: blur(6px); }
}
@keyframes exitToBelow {
  from { opacity: 1; transform: translateY(0);   filter: blur(0); }
  to   { opacity: 0; transform: translateY(28px); filter: blur(6px); }
}

/* ── Step counter ── */
.step-num {
  font-size: 12px; font-weight: 700; letter-spacing: 0.18em;
  color: #ccc44e; margin-bottom: 1.25rem; font-family: 'Inter', sans-serif;
}

/* ── Question ── */
.step-question {
  font-family: 'Marcellus', serif;
  font-size: clamp(18px, 2.8vw, 34px);
  color: #fff9f4; line-height: 1.3; margin-bottom: 1.75rem; max-width: 820px;
}
@media (max-width: 700px) {
  .step-question { font-size: clamp(17px, 5.2vw, 26px); margin-bottom: 1.1rem; }
}

/* ── Choice cards ── */
.choices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (max-width: 580px) {
  .choices-grid { grid-template-columns: 1fr; gap: 7px; }
}

.choice-card {
  background: rgba(255,249,244,0.05);
  border: 1.5px solid rgba(255,249,244,0.1);
  border-radius: 10px;
  padding: 0.9rem 1.1rem 0.9rem 0.9rem;
  display: flex; align-items: flex-start; gap: 11px;
  cursor: none; user-select: none;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
@media (pointer: coarse) { .choice-card { cursor: auto; padding: 0.7rem 0.85rem; } }
.choice-card:hover { border-color: rgba(204,196,78,0.55); background: rgba(255,249,244,0.08); transform: translateY(-1px); }
.choice-card.selected { border-color: #ccc44e; background: rgba(204,196,78,0.1); }

.choice-num {
  flex-shrink: 0; width: 24px; height: 24px;
  border: 1.5px solid rgba(204,196,78,0.45); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #ccc44e; margin-top: 2px;
  font-family: 'Inter', sans-serif;
  transition: background 0.15s, border-color 0.15s;
}
.choice-card.selected .choice-num { background: #ccc44e; border-color: #ccc44e; color: #181715; }

.choice-text {
  font-size: 15px; color: rgba(255,249,244,0.82);
  line-height: 1.5; font-family: 'Inter', sans-serif;
}
@media (max-width: 700px) { .choice-text { font-size: 13.5px; } }
.choice-card.selected .choice-text { color: #fff9f4; }

/* ── Text / Email ── */
.step-input {
  width: 100%;
  background: rgba(255,249,244,0.07);
  border: 1.5px solid rgba(204,196,78,0.35); border-radius: 8px;
  padding: 15px 20px; font-size: 17px; color: #fff9f4;
  font-family: 'Inter', sans-serif; outline: none;
  transition: border-color 0.15s, background 0.15s; -webkit-appearance: none;
}
.step-input:focus { border-color: #ccc44e; background: rgba(255,249,244,0.1); }
.step-input::placeholder { color: rgba(255,249,244,0.3); }

/* ── Checkbox ── */
.checkbox-card {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,249,244,0.05); border: 1.5px solid rgba(255,249,244,0.1);
  border-radius: 10px; padding: 1.1rem 1.4rem;
  cursor: none; user-select: none; max-width: 560px;
  transition: border-color 0.15s, background 0.15s;
}
@media (pointer: coarse) { .checkbox-card { cursor: auto; } }
.checkbox-card:hover { border-color: rgba(204,196,78,0.5); background: rgba(255,249,244,0.08); }
.checkbox-card.checked { border-color: #ccc44e; background: rgba(204,196,78,0.1); }
.checkbox-box {
  width: 22px; height: 22px; flex-shrink: 0;
  border: 2px solid rgba(204,196,78,0.5); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.checkbox-card.checked .checkbox-box { background: #ccc44e; border-color: #ccc44e; }
.checkbox-check { display: none; }
.checkbox-card.checked .checkbox-check { display: block; }
.checkbox-label { font-size: 15px; color: rgba(255,249,244,0.85); line-height: 1.4; font-family: 'Inter', sans-serif; }

/* ── Buttons ── */
.next-btn {
  margin-top: 1.5rem;
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent; border: 1.5px solid rgba(204,196,78,0.5); color: #ccc44e;
  padding: 12px 26px; border-radius: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  font-family: 'Inter', sans-serif; cursor: none;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
@media (pointer: coarse) { .next-btn { cursor: auto; } }
.next-btn:hover { background: rgba(204,196,78,0.1); border-color: #ccc44e; transform: translateY(-1px); }
.next-btn:disabled { opacity: 0.3; pointer-events: none; }

.back-btn {
  background: transparent; border: none;
  color: rgba(255,249,244,0.4); font-size: 12px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  font-family: 'Inter', sans-serif; cursor: none; transition: color 0.15s; padding: 12px 0;
}
@media (pointer: coarse) { .back-btn { cursor: auto; } }
.back-btn:hover { color: rgba(255,249,244,0.8); }

/* ── Enter hint ── */
.enter-hint {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: rgba(255,249,244,0.35);
  font-family: 'Inter', sans-serif; letter-spacing: 0.05em;
  margin-top: 1rem;
}
.enter-hint kbd {
  font-family: 'Inter', sans-serif; font-size: 10px;
  border: 1px solid rgba(255,249,244,0.2); border-radius: 3px;
  padding: 2px 5px; background: rgba(255,249,244,0.05); color: rgba(255,249,244,0.4);
}
@media (pointer: coarse) { .enter-hint { display: none; } }

/* ══ THANK YOU PAGE ══ */
#screen-thanks {
  display: none; position: relative; z-index: 5;
  min-height: 100vh; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 5rem 2rem 3rem;
}
#screen-thanks.active { display: flex; animation: enterFromBelow 0.55s cubic-bezier(0.22,1,0.36,1) both; }

.thanks-content { max-width: 540px; width: 100%; text-align: center; }

.thanks-star {
  display: block; font-size: 44px; margin-bottom: 1.25rem;
  animation: starFloat 3s ease-in-out infinite;
}
@keyframes starFloat {
  0%,100% { transform: translateY(0) rotate(0deg); opacity: 1; }
  50%      { transform: translateY(-8px) rotate(12deg); opacity: 0.8; }
}

.thanks-content h2 {
  font-family: 'Marcellus', serif;
  font-size: clamp(26px, 4.5vw, 46px);
  color: #fff9f4; margin-bottom: 0.6rem;
}

.thanks-sub {
  font-size: 15px; color: rgba(255,249,244,0.55); line-height: 1.75;
  font-family: 'Inter', sans-serif; margin-bottom: 2rem;
}

.thanks-divider {
  width: 48px; height: 1px; background: rgba(204,196,78,0.35);
  margin: 0 auto 1.75rem;
}

.thanks-cta {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: #ccc44e;
  margin-bottom: 1.1rem;
}

.social-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}
@media (max-width: 420px) { .social-grid { grid-template-columns: 1fr; } }

.social-link {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; text-decoration: none;
  border: 1.5px solid rgba(204,196,78,0.28);
  border-radius: 10px;
  background: rgba(255,249,244,0.04);
  color: rgba(255,249,244,0.75);
  font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500;
  cursor: pointer; /* override cursor:none — links must look clickable */
  transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;

.social-link:hover {
  border-color: #ccc44e; background: rgba(204,196,78,0.08);
  color: #fff9f4; transform: translateY(-2px);
}
.social-link svg { width: 17px; height: 17px; flex-shrink: 0; color: #ccc44e; }

/* ── Kajabi sink ── */
#kajabi-sink {
  position: absolute; left: -9999px; top: -9999px;
  width: 1px; height: 1px; overflow: hidden; opacity: 0; pointer-events: none;
}
</style>
</head>

<script>
/* ══ Touch detection ══ */
var isTouchDevice = ('ontouchstart' in window) || window.matchMedia('(pointer: coarse)').matches;

/* ══ Dollar cursor ══ */
if (!isTouchDevice) {
  var cursorEl = document.getElementById('dollar-cursor');
  document.addEventListener('mousemove', function(e) {
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top  = e.clientY + 'px';
  });
}

/* ══ Web Audio ══ */
var audioCtx = null, kachingBuffer = null, pendingAudioBuffer = null, pendingPlay = false;

fetch('Voicy_Shopify%20sales%20notification.mp3')
  .then(function(r) { if (!r.ok) throw new Error(); return r.arrayBuffer(); })
  .then(function(buf) { pendingAudioBuffer = buf; tryDecode(); })
  .catch(function() {});

function tryDecode() {
  if (audioCtx && pendingAudioBuffer) {
    var buf = pendingAudioBuffer; pendingAudioBuffer = null;
    audioCtx.decodeAudioData(buf, function(d) {
      kachingBuffer = d;
      if (pendingPlay) { pendingPlay = false; playChaChingSound(); }
    });
  }
}
function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  tryDecode();
}
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click',      initAudio, { once: true });

async function playChaChingSound() {
  try {
    if (!audioCtx) return;
    if (!kachingBuffer) { pendingPlay = true; return; }
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    var src = audioCtx.createBufferSource();
    src.buffer = kachingBuffer; src.connect(audioCtx.destination); src.start(0);
  } catch(e) {}
}

/* ══ Bag progress ══ */
var bagsFilled = new Set();

function buildBagProgress(total) {
  var wrap = document.getElementById('bag-progress');
  wrap.innerHTML = '';
  for (var i = 0; i < total; i++) {
    var b = document.createElement('span');
    b.className = 'prog-bag'; b.id = 'prog-bag-' + i;
    b.textContent = '\u{1F4B0}';
    wrap.appendChild(b);
  }
}

function fillBag(stepIdx, withSound) {
  if (bagsFilled.has(stepIdx)) return;
  bagsFilled.add(stepIdx);
  var bag = document.getElementById('prog-bag-' + stepIdx);
  if (bag) {
    bag.classList.add('filled');
    bag.style.animation = 'none'; bag.offsetWidth; bag.style.animation = '';
  }
  if (withSound) playChaChingSound();
}

/* ══ Quiz engine ══ */
var quizSteps = [], currentStep = 0, quizAnswers = {};
/* debounce timer — prevents double-fire if user clicks rapidly */
var autoAdvanceTimer = null;

var KNOWN_QUESTIONS = {
  'custom_2': "You just had a great discovery call. They said 'I need to think about it.' What happens next?",
  'custom_3': "You've just signed two new clients. Your calendar is full. When do you next think about selling?",
  'custom_4': "You're about to say your price. The words are forming. What comes out?",
  'custom_5': "It's been a slow month. No leads, no clients, no momentum. What do you do?",
  'custom_6': "A prospect says 'your price is too high.' What's your first instinct?",
  'custom_7': "You've just closed a client. Payment confirmed. How do you feel 24 hours later?"
};

var GENERIC_STRINGS = ['subscribe','email','content','latest','newsletter'];
function isGeneric(txt) { var low=txt.toLowerCase(); return GENERIC_STRINGS.some(function(s){return low.indexOf(s)!==-1;}); }

function getRadioGroupLabel(firstRadio, form) {
  var name = firstRadio.name;
  var fieldset = firstRadio.closest('fieldset');
  if (fieldset) { var leg=fieldset.querySelector('legend'); if(leg&&leg.textContent.trim()&&!isGeneric(leg.textContent)) return leg.textContent.trim(); }
  var escaped=CSS.escape(name);
  var totalCount=form.querySelectorAll('input[type="radio"][name="'+escaped+'"]').length;
  var el=firstRadio, groupContainer=null;
  for(var d=0;d<8;d++){
    el=el.parentElement;
    if(!el||el===form||el===document.body) break;
    if(el.querySelectorAll('input[type="radio"][name="'+escaped+'"]').length===totalCount){groupContainer=el;break;}
  }
  if(groupContainer){
    var kids=Array.from(groupContainer.children);
    for(var i=0;i<kids.length;i++){
      if(kids[i].querySelector('input[type="radio"]')) break;
      var t=kids[i].textContent.trim();
      if(t.length>8&&!isGeneric(t)&&!kids[i].querySelector('input')) return t;
    }
    var candidates=groupContainer.querySelectorAll('label,p,legend,h3,h4,span');
    for(var j=0;j<candidates.length;j++){
      var cc=candidates[j];
      if(!cc.querySelector('input')&&cc.textContent.trim().length>8&&!isGeneric(cc.textContent)) return cc.textContent.trim();
    }
    var prev=groupContainer.previousElementSibling;
    if(prev&&!prev.querySelector('input')&&prev.textContent.trim().length>8&&!isGeneric(prev.textContent)) return prev.textContent.trim();
  }
  for(var key in KNOWN_QUESTIONS){ if(name.indexOf(key)!==-1) return KNOWN_QUESTIONS[key]; }
  return name.replace(/form_submission\[|\]/g,'');
}
function getRadioOptionLabel(radio){
  var lbl=radio.closest('label');
  if(lbl){var c=lbl.cloneNode(true);c.querySelectorAll('input').forEach(function(el){el.remove();});return c.textContent.trim();}
  if(radio.id){var l2=document.querySelector('label[for="'+radio.id+'"]');if(l2) return l2.textContent.trim();}
  return radio.value;
}
function getLabelFor(field,form){
  if(field.id){var l=form.querySelector('label[for="'+field.id+'"]');if(l) return l.textContent.trim();}
  var p=field.closest('label');
  if(p){var c=p.cloneNode(true);c.querySelectorAll('input,select,textarea').forEach(function(el){el.remove();});var t=c.textContent.trim();if(t) return t;}
  var prev=field.previousElementSibling;
  while(prev){if(prev.tagName==='LABEL') return prev.textContent.trim();prev=prev.previousElementSibling;}
  return field.placeholder||field.name||'';
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
  return arr;
}

/* ── Build quiz ── */
function buildQuiz(form) {
  var allFields=form.querySelectorAll('input:not([type="hidden"]):not([type="submit"]),select,textarea');
  quizSteps=[]; var seenRadioNames=new Set();
  allFields.forEach(function(field){
    if(field.type==='hidden'||field.type==='submit') return;
    if(field.type==='radio'){
      if(seenRadioNames.has(field.name)) return;
      seenRadioNames.add(field.name);
      var group=Array.from(form.querySelectorAll('input[type="radio"][name="'+CSS.escape(field.name)+'"]'));
      var label=getRadioGroupLabel(field,form);
      var options=group.map(function(r){return{value:r.value,text:getRadioOptionLabel(r)||r.value};});
      shuffle(options);
      quizSteps.push({type:'radio',label:label,radioGroup:group,options:options});
    } else if(field.tagName==='SELECT'){
      var opts=Array.from(field.options).filter(function(o){return o.value!=='';}).map(function(o){return{value:o.value,text:o.text};});
      shuffle(opts);
      quizSteps.push({type:'select',label:getLabelFor(field,form),field:field,options:opts});
    } else if(field.type==='checkbox'){
      quizSteps.push({type:'checkbox',label:getLabelFor(field,form),field:field});
    } else {
      quizSteps.push({type:field.type==='email'?'email':'text',label:getLabelFor(field,form)||(field.type==='email'?'Email':'Name'),field:field});
    }
  });
  buildBagProgress(quizSteps.length);
  renderAllSteps();
  showStep(0);
}

/* ── Render all steps ── */
function renderAllSteps(){
  var container=document.getElementById('quiz-stage');
  container.innerHTML='';
  var total=String(quizSteps.length).padStart(2,'0');
  quizSteps.forEach(function(step,idx){
    var screen=document.createElement('div');
    screen.className='quiz-screen'; screen.id='step-'+idx;
    var num=String(idx+1).padStart(2,'0');
    var html='<div class="step-num">'+num+' / '+total+'</div>';
    html+='<div class="step-question">'+escHtml(step.label||'Question '+(idx+1))+'</div>';

    if(step.type==='radio'||step.type==='select'){
      html+='<div class="choices-grid" id="choices-'+idx+'">';
      step.options.forEach(function(opt,oi){
        html+='<div class="choice-card" data-value="'+escAttr(opt.value)+'" onclick="selectChoice(this,'+idx+')">'
          +'<div class="choice-num">'+(oi+1)+'</div>'
          +'<div class="choice-text">'+escHtml(opt.text)+'</div></div>';
      });
      html+='</div>';
      /* Back button only — NEXT replaced by auto-advance; keep NEXT hidden as fallback */
      html+='<div style="margin-top:1.25rem;display:flex;align-items:center;gap:16px;">'
        +(idx>0?'<button class="back-btn" onclick="goBack()">&#8592; Back</button>':'')
        +'<div id="next-wrap-'+idx+'" style="display:none">'
        +'<button class="next-btn" style="margin-top:0" onclick="advance('+idx+')">Next &rarr;</button></div>'
        +'</div>';
    } else if(step.type==='checkbox'){
      html+='<div class="checkbox-card" id="cb-card-'+idx+'" onclick="toggleCheckbox('+idx+')">'
        +'<div class="checkbox-box"><svg class="checkbox-check" width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#181715" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        +'<div class="checkbox-label">'+escHtml(step.label)+'</div></div>';
      html+='<div style="margin-top:1.25rem;display:flex;align-items:center;gap:16px;">'
        +(idx>0?'<button class="back-btn" onclick="goBack()">&#8592; Back</button>':'')
        +'<button class="next-btn" style="margin-top:0" onclick="advance('+idx+')">Next &rarr;</button></div>';
    } else {
      html+='<input class="step-input" id="input-'+idx+'" type="'+step.type+'" placeholder="'+escAttr(step.label)+'" oninput="onTextInput('+idx+',this)" />';
      html+='<div style="margin-top:1.25rem;display:flex;align-items:center;gap:16px;">'
        +(idx>0?'<button class="back-btn" onclick="goBack()">&#8592; Back</button>':'')
        +'<button class="next-btn" id="next-btn-'+idx+'" style="margin-top:0" onclick="advance('+idx+')" disabled>Next &rarr;</button></div>';
      html+='<div class="enter-hint"><kbd>Enter</kbd> to continue</div>';
    }
    screen.innerHTML=html;
    container.appendChild(screen);
  });
}

/* ── Interactions ── */
function selectChoice(el, stepIdx){
  /* Update selection visuals */
  document.querySelectorAll('#choices-'+stepIdx+' .choice-card').forEach(function(c){c.classList.remove('selected');});
  el.classList.add('selected');
  var val=el.dataset.value; quizAnswers[stepIdx]=val;
  var step=quizSteps[stepIdx];
  if(step.type==='radio'&&step.radioGroup){
    step.radioGroup.forEach(function(r){r.checked=(r.value===val);if(r.checked)r.dispatchEvent(new Event('change',{bubbles:true}));});
  } else if(step.type==='select'&&step.field){
    var ns=Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,'value');
    if(ns&&ns.set) ns.set.call(step.field,val); else step.field.value=val;
    step.field.dispatchEvent(new Event('change',{bubbles:true}));
  }
  fillBag(stepIdx, true);
  /* Auto-advance on ALL devices — debounce so rapid re-clicks reset the timer */
  clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(function(){ advance(stepIdx); }, 400);
}

function toggleCheckbox(stepIdx){
  var card=document.getElementById('cb-card-'+stepIdx);
  card.classList.toggle('checked');
  quizAnswers[stepIdx]=card.classList.contains('checked')?'true':'false';
  var step=quizSteps[stepIdx];
  if(step.field){step.field.checked=card.classList.contains('checked');step.field.dispatchEvent(new Event('change',{bubbles:true}));}
  setTimeout(function(){advance(stepIdx);},420);
}

function onTextInput(stepIdx,el){
  quizAnswers[stepIdx]=el.value;
  var btn=document.getElementById('next-btn-'+stepIdx);
  if(btn) btn.disabled=!el.value.trim();
}

function advance(stepIdx){
  var step=quizSteps[stepIdx];
  if((step.type==='text'||step.type==='email')&&step.field){
    var val=quizAnswers[stepIdx]||'';
    var ns=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value');
    if(ns&&ns.set) ns.set.call(step.field,val); else step.field.value=val;
    step.field.dispatchEvent(new Event('input',{bubbles:true}));
    step.field.dispatchEvent(new Event('change',{bubbles:true}));
  }
  if(step.type!=='radio'&&step.type!=='select') fillBag(stepIdx,true);
  var next=stepIdx+1;
  if(next<quizSteps.length){showStep(next,false);}
  else{submitToKajabi();}
}

function goBack(){ if(currentStep>0) showStep(currentStep-1,true); }

/* ── Smooth typeform transition ── */
function showStep(idx, goingBack){
  var outgoing=document.getElementById('step-'+currentStep);
  var incoming=document.getElementById('step-'+idx);

  /* Exit outgoing */
  if(outgoing&&outgoing!==incoming&&outgoing.classList.contains('active')){
    outgoing.classList.remove('active');
    outgoing.classList.add('exiting');
    if(goingBack) outgoing.classList.add('to-back');
    outgoing.addEventListener('animationend',function(){outgoing.classList.remove('exiting','to-back');},{once:true});
  }

  /* Enter incoming — force animation reset so repeat visits re-play cleanly */
  if(incoming){
    incoming.classList.remove('active','from-back','exiting','to-back');
    void incoming.offsetHeight; /* flush style / reset animation */
    if(goingBack) incoming.classList.add('from-back');
    incoming.classList.add('active');
    incoming.addEventListener('animationend',function(){incoming.classList.remove('from-back');},{once:true});
    /* Auto-focus text inputs on desktop */
    if(!isTouchDevice){
      var inp=incoming.querySelector('.step-input');
      if(inp) setTimeout(function(){inp.focus();},200);
    }
  }

  currentStep=idx;
  var pct=quizSteps.length>1?(idx/(quizSteps.length-1))*100:0;
  document.getElementById('progress-fill').style.width=pct+'%';
  window.scrollTo(0,0);
}

/* ── Submit ── */
function submitToKajabi(){
  document.getElementById('progress-fill').style.width='100%';
  var sink=document.getElementById('kajabi-sink');
  var btn=sink.querySelector('button[type="submit"],input[type="submit"]');
  if(btn) btn.click();
  setTimeout(showThanks,600);
}

function showThanks(){
  document.getElementById('quiz-ui').style.display='none';
  document.getElementById('bag-progress').style.display='none'; /* hide bags so they don't overlay social links */
  document.getElementById('screen-thanks').classList.add('active');
  playChaChingSound();
  for(var i=0;i<quizSteps.length;i++){(function(ii){setTimeout(function(){fillBag(ii,false);},ii*120);})(i);}
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/"/g,'&quot;');}

/* ── Poll for Kajabi form ── */
function waitForKajabi(){
  var sink=document.getElementById('kajabi-sink'), attempts=0;
  var poll=setInterval(function(){
    attempts++;
    var form=sink.querySelector('form');
    var radios=form?form.querySelectorAll('input[type="radio"]'):[];
    var inputs=form?form.querySelectorAll('input:not([type="hidden"]):not([type="submit"]),select,textarea'):[];
    if((inputs.length>=2&&radios.length>=4)||attempts>50){
      clearInterval(poll);
      if(form&&inputs.length>0) buildQuiz(form);
    }
  },300);
}

/* ══ Enter key ══ */
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter') return;
  var step=quizSteps[currentStep]; if(!step) return;
  if(step.type==='radio'||step.type==='select'){
    var sel=document.querySelector('#choices-'+currentStep+' .choice-card.selected');
    if(sel) advance(currentStep);
  } else if(step.type==='checkbox'){
    advance(currentStep);
  } else {
    var inp=document.getElementById('input-'+currentStep);
    if(inp&&inp.value.trim()) advance(currentStep);
  }
});

waitForKajabi();
</script>
