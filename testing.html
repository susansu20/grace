<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Your Sales Attachment Style?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

html, body {
  min-height: 100vh;
  background: #181715;
  font-family: 'Inter', sans-serif;
  position: relative;
  overflow-x: hidden;
}

/* ── Background ── */
#bg-layer {
  position: fixed; inset: 0;
  background: #9e1d16; z-index: 0;
}
#bg-layer::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,249,244,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
}
.corner-tl, .corner-br { position: fixed; pointer-events: none; z-index: 1; }
.corner-tl {
  top: -2px; left: -2px; width: 180px; height: 180px;
  border-top: 3px solid rgba(204,196,78,0.25);
  border-left: 3px solid rgba(204,196,78,0.25); border-radius: 2px;
}
.corner-br {
  bottom: -2px; right: -2px; width: 180px; height: 180px;
  border-bottom: 3px solid rgba(204,196,78,0.25);
  border-right: 3px solid rgba(204,196,78,0.25); border-radius: 2px;
}

/* ── Logo ── */
.brand-logo {
  position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%);
  font-family: 'Marcellus', serif;
  font-size: clamp(18px, 2.8vw, 28px);
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #ccc44e; z-index: 10; white-space: nowrap;
  pointer-events: none; user-select: none;
}

/* ── Progress bar ── */
.progress-wrap {
  position: fixed; top: 0; left: 0; right: 0;
  height: 3px; background: rgba(255,249,244,0.08); z-index: 20;
}
.progress-fill {
  height: 100%; background: #ccc44e; border-radius: 0 2px 2px 0;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* ── Dollar cursor ── */
#dollar-cursor {
  position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
  font-size: 26px; font-weight: 900; color: #ccc44e;
  font-family: 'Inter', sans-serif; line-height: 1;
  transform: translate(-50%, -50%); user-select: none;
}

/* ── Bag progress indicator ── */
#bag-progress {
  position: fixed; left: 18px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 5px;
  z-index: 9998; pointer-events: none;
}
.prog-bag {
  font-size: 24px; line-height: 1; display: block;
  filter: grayscale(1) opacity(0.22);
  transition: filter 0.5s ease;
}
.prog-bag.filled {
  filter: none;
  animation: bagBounce 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes bagBounce {
  0%   { transform: scale(0.55); }
  55%  { transform: scale(1.3);  }
  78%  { transform: scale(0.9);  }
  100% { transform: scale(1);    }
}
@media (max-width: 700px) {
  #bag-progress {
    left: 50%; top: auto; bottom: 14px;
    transform: translateX(-50%);
    flex-direction: row; gap: 4px;
  }
  .prog-bag { font-size: 20px; }
}

/* ══ QUIZ UI ══ */
#quiz-ui {
  position: relative; z-index: 5;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 6rem 2rem 4rem 80px;
}
@media (max-width: 700px) {
  #quiz-ui { padding: 6rem 1.25rem 100px; }
}

/* Transitions — enter from below, exit upward (and reverse for back) */
.quiz-screen {
  display: none;
  width: 100%; max-width: 900px;
}
.quiz-screen.active {
  display: block;
  animation: enterFromBelow 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
.quiz-screen.active.from-back {
  animation: enterFromAbove 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
.quiz-screen.exiting {
  display: block;
  pointer-events: none;
  animation: exitToAbove 0.38s ease both;
}
.quiz-screen.exiting.to-back {
  animation: exitToBelow 0.38s ease both;
}

@keyframes enterFromBelow {
  from { opacity: 0; transform: translateY(48px);  filter: blur(7px); }
  to   { opacity: 1; transform: translateY(0);     filter: blur(0);   }
}
@keyframes enterFromAbove {
  from { opacity: 0; transform: translateY(-38px); filter: blur(7px); }
  to   { opacity: 1; transform: translateY(0);     filter: blur(0);   }
}
@keyframes exitToAbove {
  from { opacity: 1; transform: translateY(0);     filter: blur(0);   }
  to   { opacity: 0; transform: translateY(-38px); filter: blur(7px); }
}
@keyframes exitToBelow {
  from { opacity: 1; transform: translateY(0);    filter: blur(0);   }
  to   { opacity: 0; transform: translateY(38px); filter: blur(7px); }
}

/* step counter */
.step-num {
  font-size: 13px; font-weight: 700; letter-spacing: 0.16em;
  color: #ccc44e; margin-bottom: 1.75rem;
  font-family: 'Inter', sans-serif;
}

/* question */
.step-question {
  font-family: 'Marcellus', serif;
  font-size: clamp(22px, 3.8vw, 44px);
  color: #fff9f4;
  line-height: 1.25; margin-bottom: 2.5rem; max-width: 820px;
}

/* ── Choice cards ── */
.choices-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (max-width: 580px) { .choices-grid { grid-template-columns: 1fr; } }

.choice-card {
  background: rgba(255,249,244,0.05);
  border: 1.5px solid rgba(255,249,244,0.1);
  border-radius: 12px;
  padding: 1.1rem 1.25rem 1.1rem 1rem;
  display: flex; align-items: flex-start; gap: 14px;
  cursor: none; user-select: none;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
}
.choice-card:hover {
  border-color: rgba(204,196,78,0.55);
  background: rgba(255,249,244,0.08);
  transform: translateY(-2px);
}
.choice-card.selected {
  border-color: #ccc44e;
  background: rgba(204,196,78,0.1);
}
.choice-num {
  flex-shrink: 0; width: 28px; height: 28px;
  border: 1.5px solid rgba(204,196,78,0.45);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #ccc44e;
  margin-top: 1px; font-family: 'Inter', sans-serif;
  transition: background 0.15s, border-color 0.15s;
}
.choice-card.selected .choice-num {
  background: #ccc44e; border-color: #ccc44e; color: #181715;
}
.choice-text {
  font-size: 14px; color: rgba(255,249,244,0.82);
  line-height: 1.55; font-family: 'Inter', sans-serif;
}
.choice-card.selected .choice-text { color: #fff9f4; }

/* ── Text / Email fields ── */
.step-input {
  width: 100%;
  background: rgba(255,249,244,0.07);
  border: 1.5px solid rgba(204,196,78,0.35);
  border-radius: 8px; padding: 18px 22px;
  font-size: 18px; color: #fff9f4;
  font-family: 'Inter', sans-serif; outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
.step-input:focus {
  border-color: #ccc44e; background: rgba(255,249,244,0.1);
}
.step-input::placeholder { color: rgba(255,249,244,0.3); }

/* ── Checkbox card ── */
.checkbox-card {
  display: flex; align-items: center; gap: 16px;
  background: rgba(255,249,244,0.05);
  border: 1.5px solid rgba(255,249,244,0.1);
  border-radius: 12px; padding: 1.25rem 1.5rem;
  cursor: none; user-select: none; max-width: 560px;
  transition: border-color 0.15s, background 0.15s;
}
.checkbox-card:hover { border-color: rgba(204,196,78,0.5); background: rgba(255,249,244,0.08); }
.checkbox-card.checked { border-color: #ccc44e; background: rgba(204,196,78,0.1); }
.checkbox-box {
  width: 24px; height: 24px; flex-shrink: 0;
  border: 2px solid rgba(204,196,78,0.5); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.checkbox-card.checked .checkbox-box { background: #ccc44e; border-color: #ccc44e; }
.checkbox-check { display: none; }
.checkbox-card.checked .checkbox-check { display: block; }
.checkbox-label { font-size: 15px; color: rgba(255,249,244,0.85); line-height: 1.4; font-family: 'Inter', sans-serif; }

/* ── Next / Submit buttons ── */
.next-btn {
  margin-top: 2rem;
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  border: 1.5px solid rgba(204,196,78,0.5); color: #ccc44e;
  padding: 13px 28px; border-radius: 6px;
  font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; font-family: 'Inter', sans-serif;
  cursor: none; transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.next-btn:hover { background: rgba(204,196,78,0.1); border-color: #ccc44e; transform: translateY(-1px); }
.next-btn:disabled { opacity: 0.3; pointer-events: none; }

/* ── Back button ── */
.back-btn {
  background: transparent; border: none;
  color: rgba(255,249,244,0.4); font-size: 13px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  font-family: 'Inter', sans-serif; cursor: none;
  transition: color 0.15s; padding: 13px 0;
}
.back-btn:hover { color: rgba(255,249,244,0.8); }

/* ── Thank-you screen ── */
#screen-thanks {
  display: none; position: relative; z-index: 5;
  min-height: 100vh; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 4rem 2rem;
}
#screen-thanks.active { display: flex; animation: enterFromBelow 0.6s cubic-bezier(0.22,1,0.36,1) both; }
#screen-thanks h2 {
  font-family: 'Marcellus', serif;
  font-size: clamp(32px, 5vw, 56px);
  color: #fff9f4; margin-bottom: 1rem;
}
#screen-thanks p { font-size: 16px; color: rgba(255,249,244,0.6); max-width: 400px; line-height: 1.7; font-family: 'Inter', sans-serif; }

/* ── Kajabi sink ── */
#kajabi-sink {
  position: absolute; left: -9999px; top: -9999px;
  width: 1px; height: 1px; overflow: hidden;
  opacity: 0; pointer-events: none;
}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="brand-logo">Pitch Please!</div>

<div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
<div id="dollar-cursor">$</div>
<div id="bag-progress"></div>

<div id="quiz-ui"></div>

<div id="screen-thanks">
  <h2>You're in. ✦</h2>
  <p>Check your inbox &mdash; your results are on their way.</p>
</div>

<!-- Kajabi form renders here, hidden — parsed + submitted programmatically -->
<div id="kajabi-sink">
  <script src="https://grace-yeo.mykajabi.com/forms/2149570193/embed.js"></script>
</div>

<script>
/* ══ Dollar cursor ══ */
(function() {
  var c = document.getElementById('dollar-cursor');
  document.addEventListener('mousemove', function(e) {
    c.style.left = e.clientX + 'px';
    c.style.top  = e.clientY + 'px';
  });
})();

/* ══ Web Audio (Shopify ka-ching) ══ */
var audioCtx = null, kachingBuffer = null, pendingAudioBuffer = null;

fetch('Voicy_Shopify%20sales%20notification.mp3')
  .then(function(r) { if (!r.ok) throw new Error('fetch failed'); return r.arrayBuffer(); })
  .then(function(buf) { pendingAudioBuffer = buf; tryDecode(); })
  .catch(function() {});

function tryDecode() {
  if (audioCtx && pendingAudioBuffer) {
    var buf = pendingAudioBuffer; pendingAudioBuffer = null;
    audioCtx.decodeAudioData(buf, function(d) { kachingBuffer = d; });
  }
}
function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  tryDecode();
}
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click',      initAudio, { once: true });

async function playChaChingSound() {
  try {
    if (!audioCtx || !kachingBuffer) return;
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    var src = audioCtx.createBufferSource();
    src.buffer = kachingBuffer; src.connect(audioCtx.destination); src.start(0);
  } catch(e) {}
}

/* ══ Bag progress ══ */
var bagsFilled = new Set();

function buildBagProgress(total) {
  var wrap = document.getElementById('bag-progress');
  wrap.innerHTML = '';
  for (var i = 0; i < total; i++) {
    var b = document.createElement('span');
    b.className = 'prog-bag';
    b.id = 'prog-bag-' + i;
    b.textContent = '\u{1F4B0}';
    wrap.appendChild(b);
  }
}

function fillBag(stepIdx, withSound) {
  if (bagsFilled.has(stepIdx)) return;
  bagsFilled.add(stepIdx);
  var bag = document.getElementById('prog-bag-' + stepIdx);
  if (bag) {
    bag.classList.add('filled');
    /* restart animation in case it was already applied */
    bag.style.animation = 'none';
    bag.offsetWidth;
    bag.style.animation = '';
  }
  if (withSound) playChaChingSound();
}

/* ══ Quiz engine ══ */
var quizSteps = [], currentStep = 0, quizAnswers = {};

/* ── Known Kajabi questions (fallback if DOM extraction fails) ── */
var KNOWN_QUESTIONS = {
  'custom_2': "You just had a great discovery call. They said ‘I need to think about it.’ What happens next?",
  'custom_3': "You’ve just signed two new clients. Your calendar is full. When do you next think about selling?",
  'custom_4': "You’re about to say your price. The words are forming. What comes out?",
  'custom_5': "It’s been a slow month. No leads, no clients, no momentum. What do you do?",
  'custom_6': "A prospect says ‘your price is too high.’ What’s your first instinct?",
  'custom_7': "You’ve just closed a client. Payment confirmed. How do you feel 24 hours later?"
};

var GENERIC_STRINGS = ['subscribe', 'email', 'content', 'latest', 'newsletter'];
function isGeneric(txt) {
  var low = txt.toLowerCase();
  return GENERIC_STRINGS.some(function(s){ return low.indexOf(s) !== -1; });
}

function getRadioGroupLabel(firstRadio, form) {
  var name = firstRadio.name;
  var fieldset = firstRadio.closest('fieldset');
  if (fieldset) { var leg = fieldset.querySelector('legend'); if (leg && leg.textContent.trim() && !isGeneric(leg.textContent)) return leg.textContent.trim(); }
  var escaped = CSS.escape(name);
  var totalCount = form.querySelectorAll('input[type="radio"][name="'+escaped+'"]').length;
  var el = firstRadio, groupContainer = null;
  for (var d = 0; d < 8; d++) {
    el = el.parentElement;
    if (!el || el === form || el === document.body) break;
    if (el.querySelectorAll('input[type="radio"][name="'+escaped+'"]').length === totalCount) { groupContainer = el; break; }
  }
  if (groupContainer) {
    var kids = Array.from(groupContainer.children);
    for (var i = 0; i < kids.length; i++) {
      if (kids[i].querySelector('input[type="radio"]')) break;
      var t = kids[i].textContent.trim();
      if (t.length > 8 && !isGeneric(t) && !kids[i].querySelector('input')) return t;
    }
    var candidates = groupContainer.querySelectorAll('label, p, legend, h3, h4, span');
    for (var j = 0; j < candidates.length; j++) {
      var cc = candidates[j];
      if (!cc.querySelector('input') && cc.textContent.trim().length > 8 && !isGeneric(cc.textContent)) return cc.textContent.trim();
    }
    var prev = groupContainer.previousElementSibling;
    if (prev && !prev.querySelector('input') && prev.textContent.trim().length > 8 && !isGeneric(prev.textContent)) return prev.textContent.trim();
  }
  for (var key in KNOWN_QUESTIONS) {
    if (name.indexOf(key) !== -1) return KNOWN_QUESTIONS[key];
  }
  return name.replace(/form_submission\[|\]/g, '');
}

function getRadioOptionLabel(radio) {
  var lbl = radio.closest('label');
  if (lbl) { var c = lbl.cloneNode(true); c.querySelectorAll('input').forEach(function(el){el.remove();}); return c.textContent.trim(); }
  if (radio.id) { var l2 = document.querySelector('label[for="'+radio.id+'"]'); if (l2) return l2.textContent.trim(); }
  return radio.value;
}

function getLabelFor(field, form) {
  if (field.id) { var l = form.querySelector('label[for="'+field.id+'"]'); if (l) return l.textContent.trim(); }
  var p = field.closest('label');
  if (p) { var c = p.cloneNode(true); c.querySelectorAll('input,select,textarea').forEach(function(el){el.remove();}); var t=c.textContent.trim(); if(t) return t; }
  var prev = field.previousElementSibling;
  while (prev) { if (prev.tagName==='LABEL') return prev.textContent.trim(); prev=prev.previousElementSibling; }
  return field.placeholder || field.name || '';
}

/* Fisher-Yates shuffle */
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

/* ── Build quiz steps from Kajabi form ── */
function buildQuiz(form) {
  var allFields = form.querySelectorAll('input:not([type="hidden"]):not([type="submit"]), select, textarea');
  quizSteps = [];
  var seenRadioNames = new Set();

  allFields.forEach(function(field) {
    if (field.type === 'hidden' || field.type === 'submit') return;
    if (field.type === 'radio') {
      if (seenRadioNames.has(field.name)) return;
      seenRadioNames.add(field.name);
      var group = Array.from(form.querySelectorAll('input[type="radio"][name="'+CSS.escape(field.name)+'"]'));
      var label = getRadioGroupLabel(field, form);
      var options = group.map(function(r) { return { value: r.value, text: getRadioOptionLabel(r) || r.value }; });
      shuffle(options); /* randomize answer order */
      quizSteps.push({ type: 'radio', label: label, radioGroup: group, options: options });
    } else if (field.tagName === 'SELECT') {
      var opts = Array.from(field.options).filter(function(o){return o.value!=='';}).map(function(o){return{value:o.value,text:o.text};});
      shuffle(opts);
      quizSteps.push({ type: 'select', label: getLabelFor(field, form), field: field, options: opts });
    } else if (field.type === 'checkbox') {
      quizSteps.push({ type: 'checkbox', label: getLabelFor(field, form), field: field });
    } else {
      quizSteps.push({ type: field.type === 'email' ? 'email' : 'text', label: getLabelFor(field, form) || (field.type==='email'?'Email':'Name'), field: field });
    }
  });

  buildBagProgress(quizSteps.length);
  renderAllSteps();
  showStep(0);
}

/* ── Render all step screens ── */
function renderAllSteps() {
  var container = document.getElementById('quiz-ui');
  container.innerHTML = '';
  var total = String(quizSteps.length).padStart(2,'0');

  quizSteps.forEach(function(step, idx) {
    var screen = document.createElement('div');
    screen.className = 'quiz-screen';
    screen.id = 'step-' + idx;
    var num = String(idx+1).padStart(2,'0');
    var html = '<div class="step-num">'+num+' / '+total+'</div>';
    html += '<div class="step-question">'+escHtml(step.label || 'Question '+(idx+1))+'</div>';

    if (step.type === 'radio' || step.type === 'select') {
      html += '<div class="choices-grid" id="choices-'+idx+'">';
      step.options.forEach(function(opt, oi) {
        html += '<div class="choice-card" data-value="'+escAttr(opt.value)+'" onclick="selectChoice(this,'+idx+')">'
          +'<div class="choice-num">'+(oi+1)+'</div>'
          +'<div class="choice-text">'+escHtml(opt.text)+'</div>'
          +'</div>';
      });
      html += '</div>';
      html += '<div class="nav-row" style="margin-top:2rem;display:flex;align-items:center;gap:16px;">'
        +(idx > 0 ? '<button class="back-btn" onclick="goBack()">&#8592; Back</button>' : '')
        +'<div id="next-wrap-'+idx+'" style="display:none">'
        +'<button class="next-btn" style="margin-top:0" onclick="advance('+idx+')">Next &rarr;</button></div>'
        +'</div>';
    } else if (step.type === 'checkbox') {
      html += '<div class="checkbox-card" id="cb-card-'+idx+'" onclick="toggleCheckbox('+idx+')">'
        +'<div class="checkbox-box"><svg class="checkbox-check" width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#181715" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        +'<div class="checkbox-label">'+escHtml(step.label)+'</div>'
        +'</div>';
      html += '<div style="margin-top:1.5rem;display:flex;align-items:center;gap:16px;">'
        +(idx > 0 ? '<button class="back-btn" onclick="goBack()">&#8592; Back</button>' : '')
        +'<button class="next-btn" style="margin-top:0" onclick="advance('+idx+')">Next &rarr;</button>'
        +'</div>';
    } else {
      html += '<input class="step-input" id="input-'+idx+'" type="'+step.type+'" placeholder="'+escAttr(step.label)+'" oninput="onTextInput('+idx+',this)" />';
      html += '<div style="margin-top:1.5rem;display:flex;align-items:center;gap:16px;">'
        +(idx > 0 ? '<button class="back-btn" onclick="goBack()">&#8592; Back</button>' : '')
        +'<button class="next-btn" id="next-btn-'+idx+'" style="margin-top:0" onclick="advance('+idx+')" disabled>Next &rarr;</button>'
        +'</div>';
    }

    screen.innerHTML = html;
    container.appendChild(screen);
  });
}

/* ── Interactions ── */
function selectChoice(el, stepIdx) {
  document.querySelectorAll('#choices-'+stepIdx+' .choice-card').forEach(function(c){c.classList.remove('selected');});
  el.classList.add('selected');
  var val = el.dataset.value;
  quizAnswers[stepIdx] = val;

  var step = quizSteps[stepIdx];
  if (step.type === 'radio' && step.radioGroup) {
    step.radioGroup.forEach(function(r) {
      r.checked = (r.value === val);
      if (r.checked) r.dispatchEvent(new Event('change', {bubbles:true}));
    });
  } else if (step.type === 'select' && step.field) {
    var ns = Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,'value');
    if (ns && ns.set) ns.set.call(step.field, val); else step.field.value = val;
    step.field.dispatchEvent(new Event('change', {bubbles:true}));
  }

  document.getElementById('next-wrap-'+stepIdx).style.display = 'block';
  fillBag(stepIdx, true); /* one bag fill per step, ignores repeats */
}

function toggleCheckbox(stepIdx) {
  var card = document.getElementById('cb-card-'+stepIdx);
  card.classList.toggle('checked');
  quizAnswers[stepIdx] = card.classList.contains('checked') ? 'true' : 'false';
  var step = quizSteps[stepIdx];
  if (step.field) { step.field.checked = card.classList.contains('checked'); step.field.dispatchEvent(new Event('change',{bubbles:true})); }
}

function onTextInput(stepIdx, el) {
  quizAnswers[stepIdx] = el.value;
  var btn = document.getElementById('next-btn-'+stepIdx);
  if (btn) btn.disabled = !el.value.trim();
}

function advance(stepIdx) {
  var step = quizSteps[stepIdx];
  if ((step.type === 'text' || step.type === 'email') && step.field) {
    var val = quizAnswers[stepIdx] || '';
    var ns = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value');
    if (ns && ns.set) ns.set.call(step.field, val); else step.field.value = val;
    step.field.dispatchEvent(new Event('input',{bubbles:true}));
    step.field.dispatchEvent(new Event('change',{bubbles:true}));
  }
  if (step.type !== 'radio' && step.type !== 'select') {
    fillBag(stepIdx, true);
  }
  var next = stepIdx + 1;
  if (next < quizSteps.length) { showStep(next, false); }
  else { submitToKajabi(); }
}

function goBack() {
  if (currentStep > 0) showStep(currentStep - 1, true);
}

/* ── Show step with typeform-style transition ── */
function showStep(idx, goingBack) {
  var outgoing = document.getElementById('step-' + currentStep);
  var incoming = document.getElementById('step-' + idx);

  if (outgoing && outgoing !== incoming && outgoing.classList.contains('active')) {
    outgoing.classList.remove('active');
    outgoing.classList.add('exiting');
    if (goingBack) outgoing.classList.add('to-back');
    outgoing.addEventListener('animationend', function() {
      outgoing.classList.remove('exiting', 'to-back');
    }, { once: true });
  }

  if (incoming) {
    if (goingBack) incoming.classList.add('from-back');
    incoming.classList.add('active');
    incoming.addEventListener('animationend', function() {
      incoming.classList.remove('from-back');
    }, { once: true });
  }

  currentStep = idx;
  var pct = quizSteps.length > 1 ? (idx / (quizSteps.length - 1)) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  window.scrollTo(0, 0);
}

/* ── Submit to Kajabi ── */
function submitToKajabi() {
  document.getElementById('progress-fill').style.width = '100%';
  var sink = document.getElementById('kajabi-sink');
  var submitBtn = sink.querySelector('button[type="submit"], input[type="submit"]');
  if (submitBtn) submitBtn.click();
  setTimeout(showThanks, 600);
}

function showThanks() {
  document.getElementById('quiz-ui').style.display = 'none';
  document.getElementById('screen-thanks').classList.add('active');
  playChaChingSound();
  /* fill any remaining bags staggered */
  for (var i = 0; i < quizSteps.length; i++) {
    (function(ii) {
      setTimeout(function() { fillBag(ii, false); }, ii * 140);
    })(i);
  }
}

/* ── Escape helpers ── */
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

/* ── Wait for Kajabi to render, then parse ── */
function waitForKajabi() {
  var sink = document.getElementById('kajabi-sink');
  var attempts = 0;
  var poll = setInterval(function() {
    attempts++;
    var form = sink.querySelector('form');
    var radios = form ? form.querySelectorAll('input[type="radio"]') : [];
    var inputs = form ? form.querySelectorAll('input:not([type="hidden"]):not([type="submit"]), select, textarea') : [];
    if ((inputs.length >= 2 && radios.length >= 4) || attempts > 50) {
      clearInterval(poll);
      if (form && inputs.length > 0) buildQuiz(form);
    }
  }, 300);
}

/* ══ Enter key → advance ══ */
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var step = quizSteps[currentStep];
  if (!step) return;
  if (step.type === 'radio' || step.type === 'select') {
    var selected = document.querySelector('#choices-'+currentStep+' .choice-card.selected');
    if (selected) advance(currentStep);
  } else if (step.type === 'checkbox') {
    advance(currentStep);
  } else {
    var input = document.getElementById('input-'+currentStep);
    if (input && input.value.trim()) advance(currentStep);
  }
});

waitForKajabi();
</script>
</body>
